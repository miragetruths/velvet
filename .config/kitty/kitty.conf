# ==============================================================================
# GENERAL & WINDOW BEHAVIOR
# ==============================================================================
confirm_os_window_close 0
hide_window_decorations yes
window_margin_width     8

# ==============================================================================
# AUDIO & VISUAL ALERTS
# ==============================================================================
enable_audio_bell       no
window_alert_on_bell    no

# ==============================================================================
# FONTS
# ==============================================================================
font_family             FiraCode Nerd Font
# font_family           JetBrains Mono
bold_font               auto
italic_font             auto
bold_italic_font        auto
font_size               13.0

# ==============================================================================
# CURSOR & SCROLLBACK
# ==============================================================================
cursor_trail            5
scrollback_indicator_delay 0
scrollbar_width         0
scrollbar_hover_width   0

# ==============================================================================
# URL HANDLING
# ==============================================================================
detect_urls             yes
url_style               curly
open_url_with           default

# ==============================================================================
# THEME & TRANSPARENCY
# ==============================================================================
background_opacity      0.50
background_blur         10

# BEGIN_KITTY_THEME
# Hachiko
include current-theme.conf
# END_KITTY_THEME

# Alternative Theme Fallbacks
# include decay.conf
include oxocarbon.conf

# ==============================================================================
# TAB BAR DESIGN
# ==============================================================================
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}"
tab_bar_margin_width    1.0
tab_bar_margin_height   1.0 0.5

# Tab Styling
active_tab_font_style   bold-italic
inactive_tab_font_style normal

# ==============================================================================
# KEYMAPS / SHORTCUTS
# ==============================================================================

# Clipboard
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Window Management
map ctrl+enter          new_window
map ctrl+shift+i        next_layout
map ctrl+shift+l        next_window
map ctrl+shift+h        previous_window

# Tab Management
map ctrl+t              new_tab
map ctrl+shift+w        close_tab

# System
map ctrl+shift+r        load_config_file

